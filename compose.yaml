# Komodo-ready stack. Point a Komodo "Stack" at this repo/compose file.
# Set the secrets in Komodo's environment / .env — do NOT commit real keys.

services:
  api:
    build: ./backend
    # Or, if you push an image to a registry, use:  image: your-registry/calorie-snap:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      DATABASE_URL: postgresql+asyncpg://calorie:${POSTGRES_PASSWORD}@db:5432/calorie
      API_KEY: ${API_KEY:-}
      DAILY_CALORIE_GOAL: ${DAILY_CALORIE_GOAL:-2000}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: calorie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: calorie
    volumes:
      - calorie-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calorie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  calorie-db:
